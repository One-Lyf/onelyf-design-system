<!-- @dsCard group="Components" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; background: #f4efe1; color: #1c2b21; padding: 28px; font-family: system-ui, -apple-system, sans-serif; }
  h2 { font-family: 'Fraunces', Georgia, serif; font-size: 16px; margin: 0 0 4px; }
  p.sub { font-size: 12px; color: #5e6c60; margin: 0 0 20px; }
  .grid { display: grid; grid-template-columns: repeat(2, max-content); gap: 16px 40px; }
  .node { display: inline-flex; align-items: center; gap: 9px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .label { font-family: 'Fraunces', Georgia, serif; font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .section { margin-top: 26px; }
  .dormant { opacity: 0.55; }
</style>
</head>
<body>
  <h2>SpaceNode</h2>
  <p class="sub">Each life domain as a lit node (warm lantern halo) in the root network.</p>
  <div class="grid" id="lit"></div>

  <div class="section">
    <h2>Dormant state</h2>
    <p class="sub">AI-off / "network sleeps" — present and ownable, glow off.</p>
    <div class="grid" id="dormant"></div>
  </div>

<script>
  const spaces = [
    ['FinLyf', '#c08a14'], ['HomLyf', '#bf6b49'], ['HlthLyf', '#6f9270'],
    ['GudLyf', '#5d648f'], ['WrkLyf', '#b36c42'], ['SkoolLyf', '#6f8090'], ['Family', '#8d6b52'],
  ];
  const node = ([label, c], dormant) => {
    const halo = dormant ? 'none' : `0 0 0 4px ${c}22, 0 0 10px ${c}55`;
    return `<div class="node ${dormant ? 'dormant' : ''}"><span class="dot" style="background:${c};box-shadow:${halo}"></span><span class="label">${label}</span></div>`;
  };
  document.getElementById('lit').innerHTML = spaces.map(s => node(s, false)).join('');
  document.getElementById('dormant').innerHTML = spaces.map(s => node(s, true)).join('');
</script>
</body>
</html>
