<!-- @dsCard group="Colors" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; background: #f4efe1; font-family: system-ui, -apple-system, sans-serif; color: #1c2b21; padding: 24px; }
  h2 { font-family: 'Fraunces', Georgia, serif; font-size: 16px; margin: 0 0 4px; }
  p.sub { font-size: 12px; color: #5e6c60; margin: 0 0 18px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
  .sw { border: 1px solid rgba(31,90,60,0.14); border-radius: 11px; overflow: hidden; background: #fffdf7; box-shadow: 0 1px 2px rgba(28,43,33,0.06), 0 8px 24px rgba(28,43,33,0.10); }
  .chip { height: 56px; }
  .meta { padding: 8px 10px; }
  .name { font-size: 12px; font-weight: 700; }
  .hex { font-size: 11px; color: #5e6c60; font-family: ui-monospace, monospace; }
  .section { margin-top: 22px; }
</style>
</head>
<body>
  <h2>Foundation palette</h2>
  <p class="sub">Warm cream + ink + forest-green — shared across every space.</p>
  <div class="grid" id="foundation"></div>

  <div class="section">
    <h2>Per-space accents</h2>
    <p class="sub">Each life domain is a node with its own accent; the foundation stays shared.</p>
    <div class="grid" id="accents"></div>
  </div>

<script>
  const foundation = [
    ['bg', '#f4efe1'], ['surface', '#fffdf7'], ['track', '#ece4d0'],
    ['ink', '#1c2b21'], ['mid', '#5e6c60'], ['dim', '#9aa593'],
    ['primary', '#1f7a4d'], ['primaryDeep', '#15623c'],
    ['gold', '#c08a14'], ['goldDeep', '#9c6f10'],
    ['success', '#1f9d5e'], ['danger', '#c0463a'], ['warning', '#cf7a1f'],
  ];
  const accents = [
    ['FinLyf · gold', '#c08a14'], ['HomLyf · terracotta', '#bf6b49'],
    ['HlthLyf · sage', '#6f9270'], ['GudLyf · indigo', '#5d648f'],
    ['WrkLyf · copper', '#b36c42'], ['SkoolLyf · blue-gray', '#6f8090'],
    ['Family · walnut', '#8d6b52'],
  ];
  const card = ([name, hex]) =>
    `<div class="sw"><div class="chip" style="background:${hex}"></div><div class="meta"><div class="name">${name}</div><div class="hex">${hex}</div></div></div>`;
  document.getElementById('foundation').innerHTML = foundation.map(card).join('');
  document.getElementById('accents').innerHTML = accents.map(card).join('');
</script>
</body>
</html>
