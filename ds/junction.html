<!-- @dsCard group="Components" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { margin: 0; background: #f4efe1; color: #1c2b21; padding: 28px; font-family: system-ui, -apple-system, sans-serif; }
  h2 { font-family: 'Fraunces', Georgia, serif; font-size: 16px; margin: 0 0 18px; }
  .junction {
    position: relative; overflow: hidden; max-width: 360px;
    border: 1px solid rgba(31,90,60,0.30); border-radius: 16px; padding: 16px 16px 15px;
    background: linear-gradient(176deg, #fbf6e7 0%, #f6efdc 100%);
    box-shadow: 0 1px 2px rgba(28,43,33,0.05), 0 10px 26px rgba(28,43,33,0.08);
  }
  .frame { position: absolute; inset: 5px; border-radius: 12px; border: 1px solid rgba(31,90,60,0.14); pointer-events: none; }
  .inner { position: relative; }
  .head { display: flex; align-items: center; gap: 11px; margin-bottom: 11px; }
  .eyebrow { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: #c08a14; display: flex; align-items: center; gap: 5px; }
  .pair { font-family: 'Fraunces', Georgia, serif; font-size: 19px; font-weight: 700; color: #15623c; letter-spacing: -0.01em; line-height: 1.1; margin-top: 2px; }
  .arrow { color: #c08a14; font-weight: 600; }
  .body { font-size: 12.5px; color: #5e6c60; margin-bottom: 11px; line-height: 1.5; }
  button { background: transparent; color: #1f7a4d; border: 1px solid rgba(31,90,60,0.30); border-radius: 11px; padding: 12px 16px; font-size: 12.5px; font-weight: 700; font-family: inherit; cursor: pointer; width: 100%; }
</style>
</head>
<body>
  <h2>JunctionCard</h2>
  <div class="junction">
    <div class="frame"></div>
    <div class="inner">
      <div class="head">
        <img src="../src/assets/glyph-live.png" width="38" height="38" style="object-fit:contain" alt="Liv" />
        <div>
          <div class="eyebrow"><span style="font-size:8px">◦</span> Liv · at a connection</div>
          <div class="pair">FinLyf <span class="arrow">↔</span> HomLyf</div>
        </div>
      </div>
      <div class="body">Liv reads your HomCuisine meal plan and pantry, then suggests meals that fit what's left in your budget.</div>
      <button>Ask Liv — eat well this week within budget</button>
    </div>
  </div>
</body>
</html>
